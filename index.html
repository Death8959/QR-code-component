<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&display=swap" rel="stylesheet">
  <title>Frontend Mentor | QR code component</title>
  <style>
    body {
      background-color: #D5E1EF;
      display: grid;
      min-height: 100vh;
      justify-items: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      margin: 0;
    }

    .container {
      width: 320px;
      border-radius: 20px;
      background-color: white;
      padding: 16px 16px 40px;
      box-sizing: border-box;
    }

    .qr {
      width: 100%;
      border-radius: 12px;
      display: block;
      margin-bottom: 24px;
    }

    .bold {
      font-weight: 700;
      font-size: 22px;
      color: #1F314F;
      text-align: center;
      line-height: 120%;
      margin: 0 0 16px;
    }

    .unbold {
      font-weight: 400;
      font-size: 15px;
      color: #68778D;
      text-align: center;
      line-height: 150%;
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <img class="qr" src="./images/image-qr-code.png" alt="QR code">
    <p class="bold">Improve your front-end skills by building projects</p>
    <p class="unbold">Scan the QR code to visit Frontend Mentor and take your coding skills to the next level</p>
  </div>
</body>
</html>
